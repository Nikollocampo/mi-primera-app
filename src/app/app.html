

<h2>📝 Lista de Posts</h2>

<!-- Estado: Cargando -->
<div *ngIf="cargandoPosts()" class="estado-cargando">
  ⏳ Cargando posts...
</div>

<!-- Estado: Error -->
<div *ngIf="errorPosts()" class="estado-error">
  ❌ {{ errorPosts() }}
</div>

<!-- Estado: Datos cargados -->
<div *ngIf="!cargandoPosts() && !errorPosts()">

  <p class="contador">
    Total de posts: <strong>{{ posts().length }}</strong>
  </p>

  <table>
    <thead>
    <tr>
      <th>ID</th>
      <th>Título</th>
      <th>Contenido</th>
      <th>Usuario ID</th>
    </tr>
    </thead>

    <tbody>
    <tr *ngFor="let post of posts()">
      <td>{{ post.id }}</td>
      <td>{{ post.title }}</td>
      <td>{{ post.body }}</td>
      <td>{{ post.userId }}</td>
    </tr>
    </tbody>
  </table>

</div>
